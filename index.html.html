<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emailgistics Quote Generator</title>
<style>
  /* ===== SCREEN STYLES (Generator UI) ===== */
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --green: #2CAB1D;
    --dark-green: #20351C;
    --light-green: #e8f7e6;
    --mid-green: #c2e8be;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-400: #9ca3af;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-800: #1f2937;
    --red: #dc2626;
    --orange: #d97706;
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--gray-100);
    color: var(--gray-800);
    min-height: 100vh;
  }

  /* Header */
  .app-header {
    background: var(--dark-green);
    color: white;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .app-header .logo-text {
    font-size: 22px;
    font-weight: 700;
    color: white;
    letter-spacing: -0.3px;
  }
  .app-header .logo-icon {
    width: 32px;
    height: 32px;
  }
  .app-header .subtitle {
    margin-left: auto;
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    font-weight: 400;
  }

  /* Layout */
  .app-body {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 0;
    min-height: calc(100vh - 65px);
  }

  /* Form Panel */
  .form-panel {
    background: white;
    border-right: 1px solid var(--gray-200);
    overflow-y: auto;
    padding: 28px 28px 40px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--light-green);
  }

  .form-section {
    margin-bottom: 28px;
  }

  .form-row {
    display: grid;
    gap: 12px;
    margin-bottom: 12px;
  }
  .form-row.two-col { grid-template-columns: 1fr 1fr; }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  label {
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-600);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  input[type="text"],
  input[type="email"],
  input[type="tel"],
  input[type="number"],
  input[type="date"],
  select,
  textarea {
    padding: 9px 12px;
    border: 1.5px solid var(--gray-200);
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--gray-800);
    background: var(--gray-50);
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(44,171,29,0.12);
    background: white;
  }
  textarea { resize: vertical; min-height: 70px; }

  /* Pricing config */
  .pricing-grid {
    background: var(--light-green);
    border: 1px solid var(--mid-green);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 14px;
  }
  .pricing-grid .label-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 6px;
  }
  .pricing-grid .label-row span {
    font-size: 11px;
    font-weight: 700;
    color: var(--dark-green);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .price-display {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--dark-green);
    padding: 6px 10px;
    background: white;
    border-radius: 4px;
    border: 1px solid var(--mid-green);
    text-align: center;
  }

  /* Toggle group */
  .toggle-group {
    display: flex;
    border: 1.5px solid var(--gray-200);
    border-radius: 6px;
    overflow: hidden;
  }
  .toggle-group label {
    flex: 1;
    padding: 8px;
    text-align: center;
    cursor: pointer;
    font-size: 13px;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 500;
    color: var(--gray-600);
    background: var(--gray-50);
    transition: all 0.15s;
    border: none;
  }
  .toggle-group input[type="radio"] { display: none; }
  .toggle-group input[type="radio"]:checked + label {
    background: var(--green);
    color: white;
    font-weight: 600;
  }
  .toggle-group label:not(:last-child) { border-right: 1px solid var(--gray-200); }

  /* Discount section */
  .discount-row {
    display: grid;
    grid-template-columns: 1fr 120px;
    gap: 10px;
    align-items: end;
  }
  .discount-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 0;
    cursor: pointer;
  }
  .discount-toggle input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--green);
    cursor: pointer;
  }
  .discount-toggle span {
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-700);
  }

  /* Notes */
  .notes-hint {
    font-size: 11px;
    color: var(--gray-400);
    margin-top: 4px;
  }

  /* Action button */
  .btn-generate {
    width: 100%;
    padding: 14px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.2px;
    margin-top: 8px;
  }
  .btn-generate:hover { background: #249918; }
  .btn-generate:active { transform: scale(0.99); }

  .btn-print {
    width: 100%;
    padding: 11px;
    background: white;
    color: var(--dark-green);
    border: 2px solid var(--green);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 10px;
  }
  .btn-print:hover { background: var(--light-green); }

  .btn-email {
    width: 100%;
    padding: 11px;
    background: white;
    color: var(--gray-700);
    border: 2px solid var(--gray-200);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 10px;
  }
  .btn-email:hover { background: var(--gray-100); border-color: var(--gray-400); }

  /* Preview Panel */
  .preview-panel {
    background: var(--gray-200);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px;
    overflow-y: auto;
  }

  .preview-hint {
    text-align: center;
    color: var(--gray-400);
    font-size: 14px;
    margin-top: 80px;
  }
  .preview-hint svg { margin-bottom: 12px; opacity: 0.3; }

  /* Quote document */
  #quote-preview {
    width: 794px;
    background: white;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    color: #1a1a1a;
    display: none;
  }

  /* ===== PRINT STYLES (PDF Output) ===== */
  @media print {
    body { background: white; }
    .app-header, .form-panel, .preview-panel > .preview-hint,
    .preview-panel > p, .btn-print { display: none !important; }
    .app-body { display: block; }
    .preview-panel { padding: 0; background: white; }
    #quote-preview {
      display: block !important;
      width: 100%;
      box-shadow: none;
      border-radius: 0;
    }
    @page { margin: 0; size: letter; }
  }

  /* ===== QUOTE DOCUMENT STYLES ===== */
  .q-page {
    padding: 48px 52px;
    min-height: 1056px; /* letter height at 96dpi */
  }

  .q-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 3px solid var(--green);
  }

  .q-logo-area {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .q-logo-name {
    font-size: 26px;
    font-weight: 800;
    color: var(--dark-green);
    letter-spacing: -0.5px;
  }
  .q-logo-name span { color: var(--green); }

  .q-company-info {
    text-align: right;
    font-size: 11.5px;
    color: #555;
    line-height: 1.7;
  }

  .q-doc-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--dark-green);
    margin-bottom: 6px;
  }

  .q-date {
    font-size: 12.5px;
    color: #666;
    margin-bottom: 24px;
  }

  /* Bill-to / Terms table */
  .q-info-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 28px;
    border: 1px solid #ddd;
    border-radius: 4px;
    overflow: hidden;
  }
  .q-info-table th {
    background: var(--dark-green);
    color: white;
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    text-align: left;
  }
  .q-info-table td {
    padding: 12px 14px;
    font-size: 12.5px;
    vertical-align: top;
    border-bottom: 1px solid #eee;
  }
  .q-info-table tr:last-child td { border-bottom: none; }
  .q-info-table .field-label {
    font-weight: 700;
    color: #444;
    width: 38%;
  }
  .q-info-table .field-value { color: #222; }
  .q-info-table tr:nth-child(even) td { background: #fafafa; }

  /* Intro text */
  .q-intro {
    font-size: 13px;
    color: #444;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  /* Features list */
  .q-features {
    background: var(--light-green);
    border: 1px solid var(--mid-green);
    border-radius: 6px;
    padding: 16px 20px;
    margin-bottom: 24px;
  }
  .q-features-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--dark-green);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }
  .q-features ul {
    list-style: none;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 20px;
  }
  .q-features ul li {
    font-size: 12px;
    color: var(--dark-green);
    padding: 2px 0;
  }
  .q-features ul li::before {
    content: "✓ ";
    color: var(--green);
    font-weight: 700;
  }

  /* Pricing section */
  .q-pricing-section {
    margin-bottom: 24px;
  }
  .q-section-heading {
    font-size: 14px;
    font-weight: 800;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--mid-green);
  }

  .q-price-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
  }
  .q-price-table tr { border-bottom: 1px solid #eee; }
  .q-price-table tr:last-child { border-bottom: none; }
  .q-price-table td { padding: 8px 12px; }
  .q-price-table .desc { color: #444; }
  .q-price-table .amount { text-align: right; font-weight: 500; }
  .q-price-table .discount-row td { color: var(--red); }
  .q-price-table .total-row td {
    font-weight: 800;
    font-size: 14px;
    color: var(--dark-green);
    padding: 12px 12px;
    border-top: 2px solid var(--dark-green);
  }
  .q-price-table .per-user {
    font-size: 11px;
    color: #777;
    font-weight: 400;
  }
  .q-price-table .subtotal-row td { background: var(--gray-50); }

  /* Notes */
  .q-notes-section {
    background: #fffdf0;
    border: 1px solid #e8dfa0;
    border-radius: 6px;
    padding: 14px 18px;
    margin-bottom: 24px;
  }
  .q-notes-section .q-section-heading { color: #92710a; border-color: #e8dfa0; }
  .q-notes-section p { font-size: 12px; color: #555; line-height: 1.7; white-space: pre-wrap; }

  /* Terms */
  .q-terms {
    font-size: 11px;
    color: #777;
    line-height: 1.6;
    margin-bottom: 28px;
    border-top: 1px solid #eee;
    padding-top: 16px;
  }
  .q-terms a { color: var(--green); }

  /* Signature */
  .q-signature {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #eee;
  }
  .q-sig-block { display: flex; flex-direction: column; gap: 18px; }
  .q-sig-block .sig-title {
    font-size: 11px;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .q-sig-line {
    border-bottom: 1px solid #333;
    height: 28px;
    position: relative;
  }
  .q-sig-field {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
  }

  /* Divider between monthly/yearly sections */
  .q-section-divider {
    border: none;
    border-top: 1px dashed var(--mid-green);
    margin: 20px 0;
  }

  /* Badge */
  .q-tier-badge {
    display: inline-block;
    background: var(--green);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-left: 8px;
    vertical-align: middle;
  }

  .q-valid {
    font-size: 11px;
    color: #888;
    margin-top: 4px;
  }
</style>
</head>

<div class="app-body">

  <!-- FORM PANEL -->
  <div class="form-panel">

    <!-- Customer Info -->
    <div class="form-section">
      <div class="section-title">Customer Information</div>
      <div class="form-row">
        <div class="form-group">
          <label>Company Name *</label>
          <input type="text" id="company" placeholder="e.g. Acme Corp" oninput="updatePreview()">
        </div>
      </div>
      <div class="form-row two-col">
        <div class="form-group">
          <label>Contact Name *</label>
          <input type="text" id="contact-name" placeholder="Full name" oninput="updatePreview()">
        </div>
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="contact-title" placeholder="e.g. IT Manager" oninput="updatePreview()">
        </div>
      </div>
      <div class="form-row two-col">
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="contact-email" placeholder="name@company.com" oninput="updatePreview()">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="contact-phone" placeholder="555-555-5555" oninput="updatePreview()">
        </div>
      </div>
    </div>

    <!-- Quote Details -->
    <div class="form-section">
      <div class="section-title">Quote Details</div>
      <div class="form-row two-col">
        <div class="form-group">
          <label>Quote Date</label>
          <input type="date" id="quote-date" oninput="updatePreview()">
        </div>
        <div class="form-group">
          <label>Billing Start Date</label>
          <input type="date" id="billing-date" oninput="updatePreview()">
        </div>
      </div>
      <div class="form-row two-col">
        <div class="form-group">
          <label>Payment Method</label>
          <select id="payment-method" onchange="updatePreview()">
            <option value="Credit Card">Credit Card</option>
            <option value="Invoice/ACH">Invoice / ACH</option>
            <option value="Invoice/Check">Invoice / Check</option>
            <option value="Invoice/Wire">Invoice / Wire</option>
          </select>
        </div>
        <div class="form-group">
          <label>Number of Users *</label>
          <input type="number" id="user-count" placeholder="e.g. 10" min="1" oninput="updatePreview()">
        </div>
      </div>
    </div>

    <!-- Plan Configuration -->
    <div class="form-section">
      <div class="section-title">Plan Configuration</div>

      <div class="form-group" style="margin-bottom:12px;">
        <label>Subscription Tier</label>
        <select id="tier" onchange="tierChanged()">
          <option value="starter">Starter</option>
          <option value="pro" selected>Pro</option>
          <option value="enterprise">Enterprise</option>
        </select>
      </div>

      <div class="form-group" style="margin-bottom:14px;">
        <label>Pricing Version</label>
        <select id="pricing-version" onchange="updatePreview()">
          <option value="new" selected>Current Pricing</option>
          <option value="old">Legacy Pricing (grandfathered)</option>
        </select>
      </div>

      <div class="form-group" style="margin-bottom:14px;">
        <label>Quote Term Options</label>
        <div class="toggle-group">
          <input type="radio" name="term" id="term-both" value="both" checked onchange="updatePreview()">
          <label for="term-both">Both Options</label>
          <input type="radio" name="term" id="term-monthly" value="monthly" onchange="updatePreview()">
          <label for="term-monthly">Monthly Only</label>
          <input type="radio" name="term" id="term-yearly" value="yearly" onchange="updatePreview()">
          <label for="term-yearly">Yearly Only</label>
        </div>
      </div>

      <!-- Live pricing display -->
      <div class="pricing-grid" id="pricing-display">
        <div class="label-row">
          <span>Term</span>
          <span>Per User/Mo</span>
          <span>Total</span>
        </div>
        <div class="label-row">
          <span style="font-size:12px;color:#555;font-weight:400;">Monthly</span>
          <div class="price-display" id="disp-monthly-per">–</div>
          <div class="price-display" id="disp-monthly-total">–</div>
        </div>
        <div class="label-row" style="margin-top:6px;">
          <span style="font-size:12px;color:#555;font-weight:400;">Yearly</span>
          <div class="price-display" id="disp-yearly-per">–</div>
          <div class="price-display" id="disp-yearly-total">–</div>
        </div>
      </div>
    </div>

    <!-- Discount -->
    <div class="form-section">
      <div class="section-title">Discount (Optional)</div>
      <label class="discount-toggle">
        <input type="checkbox" id="apply-discount" onchange="toggleDiscount()">
        <span>Apply a custom discount</span>
      </label>
      <div id="discount-fields" style="display:none; margin-top:12px;">
        <div class="discount-row">
          <div class="form-group">
            <label>Discount Label (shown on quote)</label>
            <input type="text" id="discount-label" placeholder="e.g. New Customer Discount" oninput="updatePreview()">
          </div>
          <div class="form-group">
            <label>Amount ($)</label>
            <input type="number" id="discount-amount" placeholder="0.00" min="0" step="0.01" oninput="updatePreview()">
          </div>
        </div>
        <div class="form-group" style="margin-top:8px;">
          <label>Apply Discount To</label>
          <select id="discount-apply-to" onchange="updatePreview()">
            <option value="both">Both Monthly and Yearly</option>
            <option value="monthly">Monthly Only</option>
            <option value="yearly">Yearly Only</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Notes -->
    <div class="form-section">
      <div class="section-title">Internal & Quote Notes</div>
      <div class="form-group" style="margin-bottom:12px;">
        <label>Notes on Quote (visible to customer)</label>

// ===== PRICING DATA =====
const PRICING = {

    starter: { monthly: 13, yearly_per_month: 11, yearly_annual: 132 },
    pro:     { monthly: 31, yearly_per_month: 26, yearly_annual: 312 },
    enterprise: { monthly: 55, yearly_per_month: 46, yearly_annual: 552 }
  },
  old: {
    starter: { monthly: 10, yearly_per_month: 9, yearly_annual: 108 },
    pro:     { monthly: 24, yearly_per_month: 21.60, yearly_annual: 259.20 },
    enterprise: { monthly: 55, yearly_per_month: 46, yearly_annual: 552 } // enterprise had no old pricing, use same
  }
};

const TIER_FEATURES = {
  starter: [
    'Shared mailbox assignment',
    'Message routing rules',
    'Real-time activity tracking',
    'Collision prevention',
    'Basic reporting',
    'Add-in for Outlook',
    'Admin center access',
    'Help desk support'
  ],
  pro: [
    'All Starter features',
    'User schedules',
    'Conversation history',
    'Advanced workflow rules',
    'Backup assignees',
    'Message snooze',
    'Email templates',
    'SLA reporting',
    'Tags and tag reporting',
    'Open message detail report'
  ],
  enterprise: [
    'All Pro features',
    'Priority support',
    'Advanced analytics',
    'Custom integrations',
    'Dedicated onboarding',
    'SLA guarantees',
    'Multi-tenant support',
    'Custom reporting',
    'API access',
    'Volume licensing'
  ]
};

const fmt = (n) => '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDate = (d) => {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${m}/${day}/${y}`;
};

function getPrice() {
  const tier = document.getElementById('tier').value;
  const version = document.getElementById('pricing-version').value;
  return PRICING[version][tier];
}

function updateDisplayPrices() {
  const users = parseInt(document.getElementById('user-count').value) || 0;
  const p = getPrice();
  document.getElementById('disp-monthly-per').textContent = fmt(p.monthly);
  document.getElementById('disp-yearly-per').textContent = fmt(p.yearly_per_month) + '/mo';
  document.getElementById('disp-monthly-total').textContent = users ? fmt(p.monthly * users) + '/mo' : '-';
  document.getElementById('disp-yearly-total').textContent = users ? fmt(p.yearly_annual * users) + '/yr' : '-';
}

function tierChanged() { updatePreview(); }

function toggleDiscount() {
  const show = document.getElementById('apply-discount').checked;
  document.getElementById('discount-fields').style.display = show ? 'block' : 'none';
  updatePreview();
}

function updatePreview() {
  updateDisplayPrices();
}

function generateQuote() {
  const company = document.getElementById('company').value.trim();
  const contactName = document.getElementById('contact-name').value.trim();
  if (!company || !contactName) {
    alert('Please fill in Company Name and Contact Name before generating.');
    return;
  }
  const users = parseInt(document.getElementById('user-count').value);
  if (!users || users < 1) {
    alert('Please enter a valid number of users.');
    return;
  }

  const contactTitle = document.getElementById('contact-title').value.trim();
  const contactEmail = document.getElementById('contact-email').value.trim();
  const contactPhone = document.getElementById('contact-phone').value.trim();
  const quoteDate = document.getElementById('quote-date').value;
  const billingDate = document.getElementById('billing-date').value;
  const paymentMethod = document.getElementById('payment-method').value;
  const tier = document.getElementById('tier').value;
  const version = document.getElementById('pricing-version').value;
  const term = document.querySelector('input[name="term"]:checked').value;

    zack:  { name: 'Zack King',     title: 'Director of Sales', email: 'zack@emailgistics.com',  phone: '416 239 6295' }
  };
  const preparedByKey = document.getElementById('prepared-by').value;
  let rep;

      name:  document.getElementById('custom-name').value.trim(),
      title: document.getElementById('custom-title').value.trim(),
      email: document.getElementById('custom-email').value.trim(),
      phone: document.getElementById('custom-phone').value.trim()
    };
  } else {
    rep = PREPARED_BY[preparedByKey];
  }
  let preparedByDisplay = '-';
  if (rep.name) {
    preparedByDisplay = rep.name;
    if (rep.title) preparedByDisplay += '<br><span style="font-size:11px;color:#555;">' + rep.title + '</span>';
    if (rep.email) preparedByDisplay += '<br><span style="font-size:11px;color:#2CAB1D;">' + rep.email + '</span>';
    if (rep.phone) preparedByDisplay += '<br><span style="font-size:11px;color:#777;">' + rep.phone + '</span>';
  }
  const quoteNotes = document.getElementById('quote-notes').value.trim();
  const applyDiscount = document.getElementById('apply-discount').checked;
  const discountLabel = document.getElementById('discount-label').value.trim();
  const discountAmount = parseFloat(document.getElementById('discount-amount').value) || 0;
  const discountApplyTo = document.getElementById('discount-apply-to').value;

  const p = getPrice();
  const tierLabel = tier.charAt(0).toUpperCase() + tier.slice(1);
  const features = TIER_FEATURES[tier];

  const monthlyBase = p.monthly * users;
  const yearlyBase = p.yearly_annual * users;
  const yearlyBaseAsMonthly = p.monthly * users * 12;
  const yearlyDiscount = version === 'new' ? (yearlyBaseAsMonthly - yearlyBase) : 0;

  const discMonthly = (applyDiscount && discountAmount > 0 && (discountApplyTo === 'both' || discountApplyTo === 'monthly')) ? discountAmount : 0;
  const discYearly  = (applyDiscount && discountAmount > 0 && (discountApplyTo === 'both' || discountApplyTo === 'yearly'))  ? discountAmount : 0;

  // Build date display

  const validThrough = (() => {
    const d = quoteDate ? new Date(quoteDate + 'T12:00:00') : new Date();
    d.setDate(d.getDate() + 30);
    return d.toLocaleDateString('en-US');

    if (discMonthly > 0) {
      rows += `<tr class="discount-row"><td class="desc">${discountLabel || 'Discount'}</td><td class="amount">-${fmt(discMonthly)}</td></tr>`;

    pricingHTML += `
      <div class="q-pricing-section">
        <div class="q-section-heading">Option A - Monthly Subscription</div>
        <table class="q-price-table">
          ${rows}
        </table>
      </div>`;

    if (term === 'both') pricingHTML += `<hr class="q-section-divider">`;

  if (term === 'yearly' || term === 'both') {
    let rows = `
      <tr>
        <td class="desc">Annual Subscription - ${users} user${users>1?'s':''} × ${fmt(p.monthly)}/user/month × 12 months</td>
        <td class="amount">${fmt(yearlyBaseAsMonthly)}</td>

        <table class="q-price-table">

function openEmail() {
  if (!quoteGenerated) {
    alert('Please generate a quote first.');
    return;
  }

  var PREPARED_BY_DATA = {
    chris: { name: 'Chris Giefert', title: 'Director of Sales', email: 'chris@emailgistics.com', phone: '647 933 4509' },
    zack:  { name: 'Zack King',     title: 'Director of Sales', email: 'zack@emailgistics.com',  phone: '416 239 6295' }
  };

  var company      = document.getElementById('company').value.trim() || 'your team';
  var contactName  = document.getElementById('contact-name').value.trim() || '';
  var contactEmail = document.getElementById('contact-email').value.trim();
  var tier         = document.getElementById('tier').value;
  var tierLabel    = tier.charAt(0).toUpperCase() + tier.slice(1);
  var users        = parseInt(document.getElementById('user-count').value) || 0;
  var quoteDate    = document.getElementById('quote-date').value;
  var preparedByKey = document.getElementById('prepared-by').value;

  var d = quoteDate ? new Date(quoteDate + 'T12:00:00') : new Date();
  d.setDate(d.getDate() + 30);
  var returnDate = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

  var rep;
  if (preparedByKey === 'custom') {
    rep = {
      name:  document.getElementById('custom-name').value.trim() || 'our team',
      title: document.getElementById('custom-title').value.trim(),
      email: document.getElementById('custom-email').value.trim(),
      phone: document.getElementById('custom-phone').value.trim()
    };
  } else {
    rep = PREPARED_BY_DATA[preparedByKey];
  }

  var greeting = contactName ? 'Hi ' + contactName + ',' : 'Hi,';
  var userStr = users + ' user' + (users !== 1 ? 's' : '');
  var companyName = document.getElementById('company').value.trim() || 'Your Company';

  var subjectStr = 'Emailgistics ' + tierLabel + ' Subscription Quote - ' + companyName;

  var bodyLines = [
    greeting,
    '',
    'Thank you for choosing to move forward with Emailgistics. We are excited to have you on board and look forward to working with you.',
    '',
    'Please find your requested quote attached (' + userStr + ', ' + tierLabel + ' plan). Please review, sign, and return it at your earliest convenience, and no later than ' + returnDate + '.',
    '',
    'If you have any questions at all, please do not hesitate to reach out - we are happy to help.',
    '',
    'Kind regards,',
    rep.name,
    rep.title || '',
    'Emailgistics',
    rep.email || '',
    rep.phone || ''
  ];

  var bodyStr = bodyLines.filter(function(l, i) {
    if (i < 2) return true;
    return l !== '' || bodyLines[i-1] !== '';
  }).join('\r\n');

  var to  = encodeURIComponent(contactEmail || '');
  var cc  = encodeURIComponent('billing@emailgistics.com,customersuccess@emailgistics.com');
  var subject = encodeURIComponent(subjectStr);
  var body = encodeURIComponent(bodyStr);

  window.location.href = 'mailto:' + to + '?cc=' + cc + '&subject=' + subject + '&body=' + body;
}
</script>
</body>
</html>
